<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrath Family S949 Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            codDark: '#161920',
            codCard: '#1a1e27',
            codBorder: '#2a303c',
            codAccent: '#dfa13b',
            codAccentHover: '#f0b554',
            codTextMuted: '#8b949e',
            alertRed: '#f87171'
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    
    body { font-family: 'Inter', sans-serif; }

    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .active-view { display: block; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .toast-enter { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body class="bg-codDark text-gray-200 font-sans min-h-screen flex flex-col relative">

  <!-- ==================== WELCOME SPLASH SCREEN ==================== -->
  <div id="welcome-splash" class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[100] transition-opacity duration-500">
    <div class="bg-codCard border border-codBorder rounded-2xl max-w-sm w-full p-8 shadow-2xl scale-95 transition-transform text-center mx-4 flex flex-col items-center">
      <div class="w-16 h-16 bg-codAccent/10 text-codAccent rounded-2xl flex items-center justify-center mb-6 border border-codAccent/20 shadow-lg shadow-codAccent/10">
        <i data-lucide="swords" class="w-8 h-8"></i>
      </div>
      <h2 class="text-2xl font-extrabold text-white tracking-wide mb-2 font-sans">Wrath Family Hub</h2>
      <p class="text-xs text-codTextMuted mb-8 leading-relaxed font-sans">Welcome to the S949 central database. Access live alliance statistics, roster metrics, and contribution tracking.</p>
      
      <button onclick="enterHub()" class="w-full py-3.5 bg-codAccent hover:bg-codAccentHover text-black font-extrabold rounded-xl text-sm tracking-wider uppercase transition shadow-lg shadow-codAccent/15 flex items-center justify-center space-x-2 font-sans mb-6">
        <i data-lucide="log-in" class="w-5 h-5"></i>
        <span>Enter Hub</span>
      </button>
      
      <div class="pt-5 border-t border-codBorder w-full">
        <p class="text-[9px] text-codTextMuted uppercase tracking-widest font-bold">Engineered & Designed by <span class="text-codAccent">Osep</span></p>
      </div>
    </div>
  </div>

  <div class="flex flex-1 w-full overflow-hidden relative">
    
    <!-- BACKDROP FOR MOBILE SIDEBAR -->
    <div id="sidebar-backdrop" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden" onclick="toggleSidebar(false)"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-64 bg-codCard border-r border-codBorder flex flex-col fixed md:relative z-30 h-full transform -translate-x-full md:translate-x-0 transition-transform duration-300">
      <div class="p-6 border-b border-codBorder flex items-center justify-between">
        <div class="flex items-center space-x-3">
          <div class="w-10 h-1
